name: Update futures quotes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}
# Note: GitHub's native `schedule` trigger is "best effort" and can be
# delayed by hours on free-tier public repos. An external cron-ping service
# (e.g. cron-job.org) calling the workflow_dispatch REST endpoint every 5 min
# is what actually keeps this reliable — see README/chat history for setup.

permissions:
  contents: write

concurrency:
  group: update-quotes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch quotes
        run: python3 scripts/fetch_quotes.py

      - name: Fetch US macro (FRED)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python3 scripts/fetch_macro.py
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "amb-markets-bot"
          git config user.email "actions@github.com"
          git add data/quotes.json
          [ -f data/macro.json ] && git add data/macro.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update quotes and macro data [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

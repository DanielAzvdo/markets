name: Update futures quotes

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-quotes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch quotes
        run: python3 scripts/fetch_quotes.py

      - name: Commit and push if changed
        run: |
          git config user.name "amb-markets-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- data/quotes.json; then
            git add data/quotes.json
            git commit -m "chore: update futures quotes [skip ci]"
            git push
          else
            echo "No changes to quotes.json"
          fi
